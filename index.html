<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  /* ── helpers ────────────────────────────────────────────────── */
  const fileToBase64 = (file) => new Promise((resolve, reject) => {
    if (!file) { reject(new Error("No file")); return; }
    const r = new FileReader();
    r.onload  = (e) => resolve(e.target.result);
    r.onerror = ()  => reject(new Error("FileReader error"));
    r.readAsDataURL(file);
  });

  const compressImage = (file, maxWidth = 1000, maxHeight = 1000, quality = 0.75) => new Promise((resolve, reject) => {
    if (!file) { reject(new Error("No file")); return; }
    const r = new FileReader();
    r.readAsDataURL(file);
    r.onload = (e) => {
      const img = new Image();
      img.src = e.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width;
        let h = img.height;
        if (w > h) {
          if (w > maxWidth) { h = Math.round((h * maxWidth) / w); w = maxWidth; }
        } else {
          if (h > maxHeight) { w = Math.round((w * maxHeight) / h); h = maxHeight; }
        }
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        // Fill canvas with white background (fixes transparent PNG black background issue on JPEG conversion)
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => reject(new Error("Image load error"));
    };
    r.onerror = () => reject(new Error("FileReader error"));
  });

  const cleanDataForFirebase = (val) => {
    if (val === undefined || val === null) return null;
    if (Array.isArray(val)) {
      if (val.length === 0) return "empty";
      return val.map(cleanDataForFirebase).filter(item => item !== undefined && item !== null);
    }
    if (typeof val === 'object') {
      if (val instanceof Date) return val.toISOString();
      const res = {};
      let hasKeys = false;
      Object.keys(val).forEach(k => {
        const cleaned = cleanDataForFirebase(val[k]);
        if (cleaned !== undefined && cleaned !== null) {
          res[k] = cleaned;
          hasKeys = true;
        }
      });
      return hasKeys ? res : null;
    }
    return val;
  };

    const waitForFirebase = () => new Promise((resolve, reject) => {
      let tries = 0;
      const check = setInterval(() => {
        tries++;
        if (window.firebaseAuth && window.firebaseSignIn && window.firebaseSendReset) {
          clearInterval(check); resolve();
        }
        if (tries > 40) { clearInterval(check); reject(new Error("Firebase not ready")); }
      }, 100);

      e.preventDefault();

        await waitForFirebase();
        await window.firebaseSignIn(window.firebaseAuth, email, pass);
        onLogin();

        const msg = err.message === 'Firebase not ready'
          ? 'Firebase is still loading. Please wait a moment and try again.'
          : (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found')

        setLoginErr(msg);

      setLoading(false);

  /* ── MessageInboxManager — Admin view for visitor messages ─── */
  const MessageInboxManager = () => {
    const [messages, setMessages] = useState([]);
    const [loading, setLoading] = useState(true);

    const loadMessages = () => {
      if (window.db && window.firebaseRef && window.firebaseGet) {
        window.firebaseGet(window.firebaseRef(window.db, 'messages')).then(snap => {
          const val = snap.val();
          if (val) {
            const list = Object.entries(val).map(([id, m]) => ({ id, ...m }));
            list.sort((a,b) => new Date(b.timestamp||0) - new Date(a.timestamp||0));
            setMessages(list);
          } else {
            setMessages([]);
          }
          setLoading(false);
        }).catch(err => { console.error(err); setLoading(false); });
      } else {
        setLoading(false);
      }
    };

    useEffect(() => { loadMessages(); }, []);

    const deleteMessage = (id) => {
      if (!confirm('Are you sure you want to delete this message?')) return;
      if (window.db && window.firebaseRef) {
        window.firebaseRef(window.db, `messages/${id}`).remove().then(() => {
          setMessages(prev => prev.filter(m => m.id !== id));
        });
      }
    };

    return (
      <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
        <div className="flex items-center justify-between mb-6">
          <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
            <Icon name="fa-solid fa-inbox" className="text-[#2042A4]" size={20}/> Received Messages ({messages.length})
          </h3>
          <button onClick={loadMessages} className="text-xs font-bold text-[#2042A4] hover:underline flex items-center gap-1">
            <Icon name="fa-solid fa-rotate" size={12}/> Refresh Inbox
          </button>
        </div>
        {loading ? (
          <p className="text-slate-500 text-center py-8">Loading messages...</p>
        ) : messages.length === 0 ? (
          <p className="text-slate-500 text-center py-8">No messages received yet.</p>
        ) : (
          <div className="space-y-4">
            {messages.map(m => (
              <div key={m.id} className="p-5 rounded-xl border border-slate-200 bg-slate-50/50 space-y-2">
                <div className="flex flex-wrap items-center justify-between gap-2">
                  <div className="flex items-center gap-2">
                    <span className="font-bold text-slate-800 text-base">{m.name}</span>
                    <a href={`mailto:${m.email}`} className="text-xs text-[#2042A4] font-semibold hover:underline">&lt;{m.email}&gt;</a>
                  </div>
                  <div className="flex items-center gap-3">
                    <span className="text-xs font-semibold text-slate-400">{m.timestamp ? new Date(m.timestamp).toLocaleDateString() : ''}</span>
                    <button onClick={() => deleteMessage(m.id)} className="text-red-500 hover:text-red-700 text-xs font-bold p-1">
                      <Icon name="fa-solid fa-trash" size={14}/>
                    </button>
                  </div>
                </div>
                {m.subject && <p className="text-xs font-extrabold text-slate-600 uppercase tracking-wider">Subject: {m.subject}</p>}
                <p className="text-slate-700 text-sm whitespace-pre-line pt-1">{m.message}</p>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

    const [location,    setLocation]    = useState(footerData.location            || '');
    const [institution, setInstitution] = useState(footerData.institution         || '');
    const [keywords,    setKeywords]    = useState(footerData.keywords            || '');
    const [description, setDescription] = useState(footerData.description         || '');
    const [status,      setStatus]      = useState('');

    useEffect(() => {
      setLinkedin(footerData.social?.linkedin    || '');
      setGithub(footerData.social?.github        || '');
      setScholar(footerData.social?.scholar      || '');
      setResearchgate(footerData.social?.researchgate || '');
      setLocation(footerData.location            || '');
      setInstitution(footerData.institution      || '');
      setKeywords(footerData.keywords            || '');
      setDescription(footerData.description      || '');
    }, [footerData]);

    const save = () => {
      setStatus('saving');
      setTimeout(() => {
        setFooterData({ ...footerData, description, location, institution, keywords,
          social: { linkedin, github, scholar, researchgate } });
        setStatus('saved');
        setTimeout(() => setStatus(''), 2500);
      }, 400);
    };

    const inp = "w-full p-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-[#2042A4] outline-none transition-all";

    return (
      <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
        <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
          <Icon name="fa-solid fa-share-nodes" className="text-[#2042A4]" size={20}/> Footer & Social Links
        </h3>
        <div className="space-y-5">
          <div>
            <label className="block text-sm font-semibold text-slate-700 mb-2">Footer Description</label>
            <textarea rows="2" value={description} onChange={e=>setDescription(e.target.value)} className={inp}/>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label className="block text-sm font-semibold text-slate-700 mb-2">Location</label>
              <input type="text" value={location} onChange={e=>setLocation(e.target.value)} className={inp} placeholder="Chittagong, Bangladesh"/>
            </div>
            <div>
              <label className="block text-sm font-semibold text-slate-700 mb-2">Institution</label>
              <input type="text" value={institution} onChange={e=>setInstitution(e.target.value)} className={inp} placeholder="CUET | Research"/>
            </div>
          </div>
          <div>
            <label className="block text-sm font-semibold text-slate-700 mb-2">Keywords</label>
            <input type="text" value={keywords} onChange={e=>setKeywords(e.target.value)} className={inp} placeholder="Biosensors | AI | Research"/>
          </div>
          <div className="border-t border-slate-100 pt-5">
            <p className="text-sm font-bold text-slate-700 mb-4">Social Links</p>
            <div className="space-y-3">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center flex-shrink-0">
                  <Icon name="fa-brands fa-linkedin" className="text-white" size={18}/>
                </div>
                <input type="url" value={linkedin} onChange={e=>setLinkedin(e.target.value)} className={inp} placeholder="https://linkedin.com/in/yourname"/>
              </div>
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 bg-slate-800 rounded-lg flex items-center justify-center flex-shrink-0">
                  <Icon name="fa-brands fa-github" className="text-white" size={18}/>
                </div>
                <input type="url" value={github} onChange={e=>setGithub(e.target.value)} className={inp} placeholder="https://github.com/yourname"/>
              </div>
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 bg-blue-500 rounded-lg flex items-center justify-center flex-shrink-0">
                  <Icon name="fa-solid fa-graduation-cap" className="text-white" size={18}/>
                </div>
                <input type="url" value={scholar} onChange={e=>setScholar(e.target.value)} className={inp} placeholder="https://scholar.google.com/citations?user=..."/>
              </div>
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 bg-teal-600 rounded-lg flex items-center justify-center flex-shrink-0">
                  <Icon name="fa-brands fa-researchgate" className="text-white" size={18}/>
                </div>
                <input type="url" value={researchgate} onChange={e=>setResearchgate(e.target.value)} className={inp} placeholder="https://researchgate.net/profile/..."/>
              </div>
            </div>
          </div>
          <div className="pt-4 border-t border-slate-100">
            <button onClick={save} disabled={status==='saving'}
              className={`flex items-center gap-2 px-6 py-2.5 rounded-lg font-medium transition-colors disabled:opacity-70 ${status==='saved'?'bg-green-600 text-white':'bg-[#2042A4] text-white hover:bg-blue-800'}`}>
              {status==='saving' ? <><Icon name="fa-solid fa-spinner fa-spin" size={18}/> Saving...</>
               : status==='saved' ? <><Icon name="fa-solid fa-check" size={18}/> Saved!</>
               : <><Icon name="fa-solid fa-floppy-disk" size={18}/> Save Footer & Links</>}
            </button>
          </div>
        </div>
      </div>
    );
  };

  /* ═══════════════════════════════════════════════════════════════
     APP ROOT
  ═══════════════════════════════════════════════════════════════ */
  const App = () => {
    const [theme, setTheme] = useState(() => localStorage.getItem('portfolio-theme') || 'light');

    useEffect(() => {
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
      localStorage.setItem('portfolio-theme', theme);
    }, [theme]);

    const [activeTab, setActiveTabRaw] = useState(() => {
      // Check URL for ?admin on first load
      return window.location.search.includes('admin') ? 'admin' : 'home';
    });
    const setActiveTab = (tab) => {
      setActiveTabRaw(tab);
      window.scrollTo({ top: 0, behavior: 'instant' });
      // Update URL — add ?admin when entering admin, remove when leaving
      if (tab === 'admin') {
        window.history.replaceState(null, '', '?admin');
      } else {
        window.history.replaceState(null, '', window.location.pathname);
      }
    };
    const [isMobileMenuOpen,    setIsMobileMenuOpen]    = useState(false);
    const [isExporting,         setIsExporting]         = useState(false);
    const [isDataLoaded,        setIsDataLoaded]        = useState(false);
    const [isAdminAuthenticated,setIsAdminAuthenticated]= useState(false);

    const [appData] = useState(() => {
      try { return JSON.parse(document.getElementById('portfolio-data').textContent); }
      catch { return {}; }
    });

    /* ── state ── */
    const [profile,          setProfile]          = useState(appData.profile          || {});
    const [footerData,        setFooterData]        = useState(appData.footerData        || {});
    const [homeSlider,       setHomeSlider]       = useState(appData.homeSlider        || []);
    const [noticeBoard,      setNoticeBoard]      = useState(appData.noticeBoard       || []);
    const [gallery,          setGallery]          = useState(appData.gallery           || []);
    const [skills,           setSkills]           = useState(appData.skills            || []);
    const [researchInterests,setResearchInterests]= useState(appData.researchInterests || []);
    const [cvData,           setCvData]           = useState(appData.cvData            || {});
    const [education,        setEducation]        = useState(appData.education         || []);
    const [projects,         setProjects]         = useState(appData.projects          || []);
    const [achievements,     setAchievements]     = useState(appData.achievements      || []);
    const [publications,     setPublications]     = useState(appData.publications      || []);
    const [experience,       setExperience]       = useState(appData.experience        || []);
    const [blog,             setBlog]             = useState(appData.blog              || []);

 
    const [syncStatus, setSyncStatus] = useState({ type: '', message: '' });

    const showSyncNotification = (type, message) => {
      setSyncStatus({ type, message });
      if (type === 'success') {
        setTimeout(() => {
          setSyncStatus(p => p.message === message ? { type: '', message: '' } : p);
        }, 3000);
      } else if (type === 'error') {
        setTimeout(() => {
          setSyncStatus(p => p.message === message ? { type: '', message: '' } : p);
        }, 6000);
      }
    };

    /* ── Instant Real-time Cloud Auto-Sync Setter Helper ── */
    const createAutoSaveSetter = (stateKey, localSetter) => {
      return (newValue) => {
        localSetter(newValue);
        if (window.db && window.firebaseSet && window.firebaseRef) {
          try {
            const cleaned = cleanDataForFirebase(newValue);
            showSyncNotification('syncing', `Syncing changes for ${stateKey}...`);
            window.firebaseSet(window.firebaseRef(window.db, `portfolioData/${stateKey}`), cleaned)
              .then(() => {
                showSyncNotification('success', `Successfully synced ${stateKey}!`);
              })
              .catch(err => {
                console.error(`Sync error for ${stateKey}:`, err);
                showSyncNotification('error', `Sync failed: ${err.message}`);
              });
          } catch (err) {
            console.error(`Synchronous sync error for ${stateKey}:`, err);
            showSyncNotification('error', `Sync failed: ${err.message}`);
          }
        }
      };
    };

    /* ── Persistent Firebase Auth state listener ── */
    useEffect(() => {
      let unsubscribe;
      const setupAuthListener = () => {
        if (window.firebaseAuth && window.firebaseOnAuthStateChanged) {
          unsubscribe = window.firebaseOnAuthStateChanged(window.firebaseAuth, (user) => {
            if (user) {
              setIsAdminAuthenticated(true);
            } else {
              setIsAdminAuthenticated(false);
            }
          });
          return true;
        }
        return false;
      };

      const timer = setInterval(() => {
        if (setupAuthListener()) {
          clearInterval(timer);
        }
      }, 100);

      return () => {
        clearInterval(timer);
        if (unsubscribe) unsubscribe();
      };
    }, []);

    /* ── ONE-TIME Firebase read on mount (no realtime listener = no overwrite) ── */
    useEffect(() => {
      const load = async () => {
        try {
          if (window.db && window.firebaseRef && window.firebaseGet) {
            const snap = await window.firebaseGet(window.firebaseRef(window.db, 'portfolioData'));
            const d = snap.val();
            if (d) {
              const toArray = (val) => {
                if (!val || val === "empty") return [];
                if (Array.isArray(val)) return val.filter(Boolean);
                if (typeof val === 'object') return Object.values(val).filter(Boolean);
                return [];
              };

              setProfile(d.profile || {});
              setHomeSlider(d.homeSlider !== undefined ? toArray(d.homeSlider) : appData.homeSlider || []);
              setNoticeBoard(d.noticeBoard !== undefined ? toArray(d.noticeBoard) : appData.noticeBoard || []);
              setGallery(d.gallery !== undefined ? toArray(d.gallery) : appData.gallery || []);
              setSkills(d.skills !== undefined ? toArray(d.skills) : appData.skills || []);
              setResearchInterests(d.researchInterests !== undefined ? toArray(d.researchInterests) : appData.researchInterests || []);
              setCvData(d.cvData || {});
              setEducation(d.education !== undefined ? toArray(d.education) : appData.education || []);
              setProjects(d.projects !== undefined ? toArray(d.projects) : appData.projects || []);
              setAchievements(d.achievements !== undefined ? toArray(d.achievements) : appData.achievements || []);
              setPublications(d.publications !== undefined ? toArray(d.publications) : appData.publications || []);
              setExperience(d.experience !== undefined ? toArray(d.experience) : appData.experience || []);
              setBlog(d.blog !== undefined ? toArray(d.blog) : appData.blog || []);
              setFooterData(d.footerData || {});

              // ── Auto-update OG tags from Firebase profile ──
              const setMeta = (sel, val) => { const el = document.querySelector(sel); if (el && val) el.setAttribute('content', val); };
              if (d.profile?.name)   { setMeta('meta[property="og:title"]',    `${d.profile.name} — Researcher | Biosensors & PoC Diagnostics`);
                                       setMeta('meta[name="twitter:title"]',   `${d.profile.name} — Researcher`);
                                       setMeta('meta[property="og:site_name"]', `${d.profile.name} Portfolio`);
                                       document.title = `${d.profile.name} - Portfolio`; }
              if (d.profile?.bio)    { setMeta('meta[property="og:description"]', d.profile.bio.slice(0, 200));
                                       setMeta('meta[name="twitter:description"]', d.profile.bio.slice(0, 200));
                                       setMeta('meta[name="description"]', d.profile.bio.slice(0, 200)); }
              if (d.profile?.avatar && !d.profile.avatar.startsWith('data:')) {
                setMeta('meta[property="og:image"]',  d.profile.avatar);
                setMeta('meta[name="twitter:image"]', d.profile.avatar);
              }
            }
          }
        } catch (err) { console.warn("Firebase load error:", err); }
        setIsDataLoaded(true);
      };
      // Wait until Firebase SDK is ready
      const timer = setInterval(() => {
        if (window.firebaseGet) { clearInterval(timer); load(); }
      }, 100);
      // Fallback: show content after 4s even if Firebase never loads
      const fallback = setTimeout(() => { clearInterval(timer); setIsDataLoaded(true); }, 4000);
      return () => { clearInterval(timer); clearTimeout(fallback); };
    }, []);

    /* ── Publish to Firebase ── */
    const handlePublish = async () => {
      setIsExporting(true);
      try {
        const data = { profile, homeSlider, researchInterests, cvData, education, projects, achievements, publications, experience, blog, footerData };
        await window.firebaseSet(window.firebaseRef(window.db, 'portfolioData'), data);
        alert("✅ Published! Changes saved to Firebase.");
      } catch (err) { alert("❌ Publish failed: " + err.message); }
      setIsExporting(false);
    };

    const navItems = [
      { id: 'home',         label: 'Home' },
      { id: 'education',    label: 'Education' },
      { id: 'projects',     label: 'Skills & Projects' },
      { id: 'gallery',      label: 'Gallery' },
      { id: 'publications', label: 'Publications' },
      { id: 'experience',   label: 'Experience' },
      { id: 'achievements', label: 'Achievements' },
      { id: 'cv',           label: 'CV' },
      { id: 'contact',      label: 'Contact' },
      { id: 'blog',         label: 'Blog' },
    ];

    /* ── Footer ── */
    const Footer = () => (
      <footer className="bg-[#2042A4] text-white py-16 mt-20">
        <div className="max-w-6xl mx-auto px-6 lg:px-8">
          <div className="grid md:grid-cols-2 gap-12 mb-12">
            <div>
              <h2 className="text-2xl font-bold mb-4">{profile.name}</h2>
              <p className="text-blue-100 text-sm mb-6 leading-relaxed max-w-md">{footerData.description}</p>
              <ul className="space-y-3 text-sm text-blue-100">
                <li className="flex items-center gap-2"><Icon name="fa-solid fa-location-dot" className="text-red-400"/>{footerData.location}</li>
                <li className="flex items-center gap-2"><Icon name="fa-solid fa-graduation-cap" className="text-amber-300"/>{footerData.institution}</li>
                <li className="flex items-center gap-2"><Icon name="fa-solid fa-bolt" className="text-amber-400"/>{footerData.keywords}</li>
              </ul>
            </div>
            <div>
              <h3 className="text-lg font-bold mb-4 border-b border-blue-800/50 pb-2">Let's Connect</h3>
              <div className="flex gap-3">
                <a href={footerData.social?.linkedin||"#"} target="_blank" className="w-10 h-10 rounded bg-blue-600 hover:bg-blue-500 flex items-center justify-center transition-colors"><Icon name="fa-brands fa-linkedin" size={20}/></a>
                <a href={footerData.social?.github||"#"}   target="_blank" className="w-10 h-10 rounded bg-blue-600 hover:bg-blue-500 flex items-center justify-center transition-colors"><Icon name="fa-brands fa-github" size={20}/></a>
                <a href={footerData.social?.scholar||"#"}  target="_blank" className="w-10 h-10 rounded bg-blue-600 hover:bg-blue-500 flex items-center justify-center transition-colors"><Icon name="fa-solid fa-graduation-cap" size={20}/></a>
                <a href={footerData.social?.researchgate||"#"} target="_blank" className="w-10 h-10 rounded bg-blue-600 hover:bg-blue-500 flex items-center justify-center transition-colors"><Icon name="fa-brands fa-researchgate" size={20}/></a>
                <a href={`mailto:${profile.email}`}        className="w-10 h-10 rounded bg-blue-600 hover:bg-blue-500 flex items-center justify-center transition-colors"><Icon name="fa-solid fa-envelope" size={20}/></a>
              </div>
            </div>
          </div>
          <div className="border-t border-blue-800/50 pt-8 text-center">
            <p className="text-xs text-blue-300">© {new Date().getFullYear()} {profile.name}. All Rights Reserved.</p>
          </div>
        </div>
      </footer>
    );

    if (!isDataLoaded) return (
      <div className="min-h-screen flex flex-col items-center justify-center bg-[#F8FAFC]">
        <Icon name="fa-solid fa-spinner fa-spin" size={48} className="text-[#2042A4] mb-4"/>
        <p className="text-slate-600 font-semibold">Syncing with Cloud Database...</p>
      </div>
    );

    return (
      <div className="min-h-screen bg-transparent text-slate-900 flex flex-col relative overflow-x-hidden">
        {/* Soft Background Mesh Decorative Blurs */}
        <div className="fixed top-[-10%] left-[-10%] w-[45vw] h-[45vw] rounded-full bg-blue-500/5 blur-[100px] pointer-events-none z-[-1]"/>
        <div className="fixed bottom-[-10%] right-[-10%] w-[45vw] h-[45vw] rounded-full bg-indigo-500/5 blur-[100px] pointer-events-none z-[-1]"/>
        <div className="fixed top-[40%] left-[50%] -translate-x-1/2 w-[35vw] h-[35vw] rounded-full bg-purple-500/3 blur-[90px] pointer-events-none z-[-1]"/>

        {/* HEADER */}
        <header className="fixed top-0 left-0 right-0 h-20 bg-white border-b border-slate-200 z-50 flex items-center justify-between px-6 md:px-12 xl:px-20 shadow-sm">
          <button onClick={()=>{setActiveTab('home');window.scrollTo(0,0);}} className="font-bold text-2xl text-[#2042A4]">{profile.name}</button>
          <div className="flex items-center gap-4">
            <nav className="hidden lg:flex items-center gap-1">
              {navItems.map(({id, label}) => (
                <button key={id} onClick={()=>setActiveTab(id)}
                  className={`px-4 py-2 text-sm font-semibold rounded transition-colors ${activeTab===id?'bg-[#2042A4] text-white':'text-slate-600 hover:text-[#2042A4] hover:bg-blue-50'}`}>
                  {label}
                </button>
              ))}
            </nav>
            
            {/* Theme Toggle */}
            <button onClick={() => setTheme(t => t === 'light' ? 'dark' : 'light')}
              className="theme-toggle-btn p-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-600 transition-colors"
              title="Toggle Light/Dark Mode">
              <Icon name={theme === 'light' ? 'fa-solid fa-moon' : 'fa-solid fa-sun'} size={18}/>
            </button>

            <button className="lg:hidden p-2 rounded-lg text-slate-600 hover:bg-slate-100 transition-colors"
              onClick={()=>setIsMobileMenuOpen(v=>!v)}>
              <Icon name={isMobileMenuOpen?"fa-solid fa-xmark":"fa-solid fa-bars"} size={24}/>
            </button>
          </div>
        </header>

        {/* MOBILE MENU */}
        {isMobileMenuOpen && (
          <div className="fixed top-20 left-0 right-0 z-40 bg-white border-b border-slate-200 shadow-lg lg:hidden">
            <nav className="flex flex-col p-4 gap-1 max-h-[80vh] overflow-y-auto">
              {navItems.map(({id, label}) => (
                <button key={id} onClick={()=>{setActiveTab(id);setIsMobileMenuOpen(false);}}
                  className={`px-4 py-3 text-sm font-semibold rounded text-left transition-colors ${activeTab===id?'bg-[#2042A4] text-white':'text-slate-600 hover:bg-slate-50'}`}>
                  {label}
                </button>
              ))}
            </nav>
          </div>
        )}

        {/* MAIN */}
        <main className="flex-1 w-full px-6 md:px-8 lg:px-12 xl:px-20 pt-28 pb-20">
          {activeTab !== 'admin' && (
            <div key={activeTab} className="page-enter">
              {activeTab==='home'         && <HomeView profile={profile} setActiveTab={setActiveTab} homeSlider={homeSlider} researchInterests={researchInterests} noticeBoard={noticeBoard}/>}
              {activeTab==='education'    && <EducationView education={education}/>}
              {activeTab==='projects'     && <ProjectsView projects={projects} skills={skills}/>}
              {activeTab==='gallery'      && <GalleryView gallery={gallery}/>}
              {activeTab==='publications' && <PublicationsView publications={publications}/>}
              {activeTab==='experience'   && <ExperienceView experience={experience}/>}
              {activeTab==='achievements' && <AchievementsView achievements={achievements}/>}
              {activeTab==='cv'           && <CVView cvData={cvData}/>}
              {activeTab==='contact'      && <ContactView profile={profile}/>}
              {activeTab==='blog'         && <BlogView blog={blog}/>}
            </div>
          )}

          {activeTab==='admin' && !isAdminAuthenticated && (
            <AdminLoginView onLogin={()=>setIsAdminAuthenticated(true)}/>
          )}

          {activeTab==='admin' && isAdminAuthenticated && (
            <div className="slide-up max-w-4xl mx-auto">
              {/* Publish banner */}
              <div className="bg-emerald-50 border-2 border-emerald-600 rounded-2xl p-6 mb-8 flex flex-col md:flex-row items-start md:items-center justify-between gap-4 shadow-lg">
                <div>
                  <h3 className="text-xl font-bold text-emerald-900 mb-1">⚡ Live Real-time Cloud Sync Active</h3>
                  <p className="text-emerald-700 text-sm font-medium">All changes you make below are instantly synced and saved to Firebase in real-time. No manual publish required!</p>
                </div>
                <div className="flex flex-wrap gap-3 w-full md:w-auto">
                  <button onClick={async () => {
                    try {
                      if (window.firebaseSignOut && window.firebaseAuth) {
                        await window.firebaseSignOut(window.firebaseAuth);
                        setIsAdminAuthenticated(false);
                      }
                    } catch (err) { alert("Logout failed: " + err.message); }
                  }}
                    className="flex-1 md:flex-none flex items-center justify-center gap-2 bg-white border border-slate-300 text-slate-750 px-5 py-3 rounded-xl font-bold shadow-sm hover:bg-slate-50 active:scale-95 transition-all">
                    <Icon name="fa-solid fa-right-from-bracket" size={18} className="text-slate-500"/> Sign Out
                  </button>
                </div>
              </div>

              <div className="space-y-8 pb-12 pt-2">
                <MessageInboxManager />
                <CVManager cvData={cvData} setCvData={createAutoSaveSetter('cvData', setCvData)}/>
                <ProfileManager profile={profile} setProfile={createAutoSaveSetter('profile', setProfile)}/>
                <SocialManager footerData={footerData} setFooterData={createAutoSaveSetter('footerData', setFooterData)}/>
                <ListManager title="Gallery Showcase Photos" items={gallery} setItems={createAutoSaveSetter('gallery', setGallery)} fields={[
                  {key:'image',    label:'Photo Image', type:'image'},
                  {key:'title',    label:'Photo Title', type:'text'},
                  {key:'category', label:'Category (e.g. Conferences, Lab & Research, Awards)', type:'text'},
                  {key:'date',     label:'Date / Period', type:'text', placeholder:'e.g. Oct 2024'},
                  {key:'caption',  label:'Photo Description / Caption', type:'textarea'}
                ]}/>
                <ListManager title="Academic Notice Board & Updates" items={noticeBoard} setItems={createAutoSaveSetter('noticeBoard', setNoticeBoard)} fields={[
                  {key:'date', label:'Date / Period', type:'text'},
                  {key:'text', label:'Notice / Milestone Text', type:'textarea'}
                ]}/>
                <ListManager title="Technical Skills Categories" items={skills} setItems={createAutoSaveSetter('skills', setSkills)} fields={[
                  {key:'category', label:'Skill Category Name', type:'text', placeholder:'e.g. Programming & Simulation'},
                  {key:'items',    label:'Skill Items (Comma separated)', type:'textarea', placeholder:'e.g. Python, MATLAB, COMSOL, SCAPS-1D'}
                ]}/>
                <ListManager title="Research Interests" items={researchInterests} setItems={createAutoSaveSetter('researchInterests', setResearchInterests)} fields={[
                  {key:'icon',        label:'FontAwesome Icon Code', type:'text',     placeholder:'e.g. fa-solid fa-flask'},
                  {key:'title',       label:'Interest Title',        type:'text'},
                  {key:'description', label:'Description',           type:'textarea'}
                ]}/>
                <ListManager title="Achievements Showcase Slider" items={homeSlider} setItems={createAutoSaveSetter('homeSlider', setHomeSlider)} fields={[
                  {key:'image',   label:'Slider Image',   type:'image'},
                  {key:'caption', label:'Image Caption',  type:'text'}
                ]}/>
                <ListManager title="Projects" items={projects} setItems={createAutoSaveSetter('projects', setProjects)} fields={[
                  {key:'image',       label:'Project Screenshot', type:'image'},
                  {key:'title',       label:'Project Name',       type:'text'},
                  {key:'category',    label:'Category Tag (e.g. Simulation, Biosensors)', type:'text', placeholder:'e.g. Biosensors'},
                  {key:'tools',       label:'Tools Used',         type:'text', placeholder:'e.g. COMSOL Multiphysics 6.3'},
                  {key:'outcome',     label:'Outcome / Key Results (Optional)', type:'textarea', placeholder:'e.g. Validated simulation model demonstrating high gate efficiency...'},
                  {key:'link',        label:'View Report / Project Link (Optional)', type:'text', placeholder:'e.g. https://...'},
                  {key:'description', label:'Description',        type:'textarea'}
                ]}/>
                <ListManager title="Publications" items={publications} setItems={createAutoSaveSetter('publications', setPublications)} fields={[
                  {key:'title',       label:'Publication Title', type:'text'},
                  {key:'journal',     label:'Journal',          type:'text'},
                  {key:'year',        label:'Year',             type:'text'},
                  {key:'link',        label:'Publication Link / DOI URL', type:'text', placeholder:'e.g. https://doi.org/...'},
                  {key:'description', label:'Abstract',         type:'textarea'}
                ]}/>
                <ListManager title="Blog Posts" items={blog} setItems={createAutoSaveSetter('blog', setBlog)} fields={[
                  {key:'image',       label:'Cover Image', type:'image'},
                  {key:'title',       label:'Title',       type:'text'},
                  {key:'date',        label:'Date',        type:'text'},
                  {key:'description', label:'Excerpt',     type:'textarea'},
                  {key:'link',        label:'Article Link (Google Drive, Medium, etc.)', type:'text', placeholder:'e.g. https://drive.google.com/...' }
                ]}/>
                <ListManager title="Education" items={education} setItems={createAutoSaveSetter('education', setEducation)} fields={[
                  {key:'degree',      label:'Degree Name',       type:'text'},
                  {key:'institution', label:'Institution Name',  type:'text'},
                  {key:'year',        label:'Year',              type:'text'},
                  {key:'cgpa',        label:'CGPA / Result (Optional)', type:'text', placeholder:'e.g. CGPA 3.66 / 4.00'},
                  {key:'thesis',      label:'Undergraduate Thesis / Focus Topic', type:'textarea'},
                  {key:'coursework',  label:'Relevant Coursework Badges (Comma separated)', type:'text', placeholder:'e.g. Nanotechnology, Biosensors, Signal Processing'},
                  {key:'details',     label:'Details / Location', type:'textarea'}
                ]}/>
                <ListManager title="Experience" items={experience} setItems={createAutoSaveSetter('experience', setExperience)} fields={[
                  {key:'role',        label:'Role',        type:'text'},
                  {key:'company',     label:'Company',     type:'text'},
                  {key:'duration',    label:'Duration',    type:'text'},
                  {key:'description', label:'Description', type:'textarea'}
                ]}/>
                <ListManager title="Achievements" items={achievements} setItems={createAutoSaveSetter('achievements', setAchievements)} fields={[
                  {key:'image',       label:'Image',       type:'image'},
                  {key:'title',       label:'Title',       type:'text'},
                  {key:'date',        label:'Date',        type:'text'},
                  {key:'description', label:'Description', type:'textarea'}
                ]}/>
              </div>
            </div>
          )}
        </main>

        {activeTab !== 'admin' && <Footer/>}

        {/* Float Sync Status Toast Notification */}
        {syncStatus.message && (
          <div className={`fixed bottom-6 right-6 z-[9999] flex items-center gap-3 px-5 py-4 rounded-2xl shadow-2xl border backdrop-blur-md transition-all duration-500 bg-white/90 ${
            syncStatus.type === 'syncing' ? 'border-blue-200 text-blue-800' :
            syncStatus.type === 'success' ? 'border-emerald-200 text-emerald-800' :
            'border-rose-200 text-rose-800'
          }`}>
            {syncStatus.type === 'syncing' && <Icon name="fa-solid fa-spinner fa-spin" size={18} className="text-blue-500"/>}
            {syncStatus.type === 'success' && <Icon name="fa-solid fa-circle-check" size={18} className="text-emerald-500"/>}
            {syncStatus.type === 'error' && <Icon name="fa-solid fa-circle-exclamation" size={18} className="text-rose-500"/>}
            <span className="text-sm font-semibold">{syncStatus.message}</span>
          </div>
        )}
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
